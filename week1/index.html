<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeHelp Week 1 Assignment</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <h1 class="site-title">My Website</h1>
      <nav class="desktop-menu" aria-label="Main navigation">
        <a href="#">Item 1</a>
        <a href="#">Item 2</a>
        <a href="#">Item 3</a>
        <a href="#">Item 4</a>
      </nav>
      <button class="burger-button" type="button" aria-label="Open menu" aria-controls="mobile-menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

      <p>Welcome to MyHome</p>

    <main class="content">
      <section class="bars" aria-label="Promotions">
        <article class="bar bar-large">

          <img src="assets/bar-3.svg" alt="Night forest" />

        </article>
      </section>

      <section class="cards" aria-label="Featured content">
        <article class="card" style="--image: url('assets/card.svg')">
          <button class="star" type="button" aria-label="Favorite item 1">★</button>
          <p>Title 1</p>
        </article>
